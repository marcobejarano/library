<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
  <title>Library</title>
</head>
<body>
  <div class="container">
    <form action="#" method="post" name="form" id="forms">
      <h1>Library</h1>
      <div class="field">
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" placeholder="Enter the book author" required>
        <small></small>
      </div>
      <div class="field">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" placeholder="Enter the book title" required>
        <small></small>
      </div>
      <div class="field">
        <label for="publicationYear">Publication Year:</label>
        <input type="number" id="publicationYear" name="publicationYear" placeholder="Enter the publication year" required>
        <small></small>
      </div>
      <div class="field">
        <label>Read Status:</label>
        <input type="radio" id="yes" name="readStatus" value="Yes">
        <label for="yes">Yes</label>
        <input type="radio" id="no" name="readStatus" value="No">
        <label for="no">No</label>
      </div>
      <div class="field">
        <button type="submit">Add this book</button>
      </div>
    </form>
    <div class="main">
      <h2>List of Books</h2>
      <table>
        <thead>
          <tr>
            <th>Author</th>
            <th>Title</th>
            <th>Publication Year</th>
            <th>Read Status</th>
            <th>Button</th>
            <th>Button</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
